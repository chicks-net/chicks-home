---
# Enable all default rules
default: True
# MD013 - Line length: disabled (no line length limit)
MD013: False
# MD041 - First line heading: disabled (files need not start with a top-level heading)
MD041: False
# MD042 - No empty links: disabled
MD042: False
# MD004 - Unordered list style: enforce dashes (-) instead of asterisks or plus signs
MD004:
  style: dash
# MD010 - Hard tabs: allow hard tabs inside code blocks
MD010:
  code_blocks: False