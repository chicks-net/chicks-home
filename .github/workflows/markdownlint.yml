---
name: MarkdownLint
on:
  push:
    branches:
      - main
  pull_request:

# global permissions
permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6  # zizmor: ignore[unpinned-uses]
      with:
        persist-credentials: false
    - uses: DavidAnson/markdownlint-cli2-action@v22  # zizmor: ignore[unpinned-uses]
      with:
        globs: |
          **/*.md
          !.github/pull_request_template.md
